<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BUPT TA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <h1 class="system-logo">BUPT TA System</h1>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <!-- Flash Message Example (hidden by default) -->
            <div class="alert alert-danger d-none" id="errorMessage">
                Invalid email or password
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required
                           placeholder="Enter your email">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="Enter your password">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>

                <div class="text-center">
                    <p class="mb-0">Don't have an account? <a href="register.html">Register here</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simulate login routing based on role
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;

            // Simple routing simulation
            if (email.includes('applicant')) {
                window.location.href = 'applicant_home.html';
            } else if (email.includes('organiser')) {
                window.location.href = 'organiser_home.html';
            } else if (email.includes('admin')) {
                window.location.href = 'admin_dashboard.html';
            } else {
                document.getElementById('errorMessage').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
